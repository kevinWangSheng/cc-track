<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc-track Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }

  .header { padding: 20px 30px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: #58a6ff; }

  .controls { display: flex; gap: 8px; }
  .controls button { padding: 6px 14px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px; }
  .controls button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .controls button:hover { background: #30363d; }
  .controls button.active:hover { background: #388bfd; }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 30px; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; }
  .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .card .value.cost { color: #f0883e; }
  .card .value.sessions { color: #58a6ff; }
  .card .value.tools { color: #56d364; }
  .card .value.error { color: #f85149; }

  .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 0 30px 20px; }
  .chart-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 20px; }
  .chart-card h3 { font-size: 14px; color: #8b949e; margin-bottom: 12px; }

  .bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 30px 20px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: #8b949e; border-bottom: 1px solid #21262d; font-weight: 500; }
  td { padding: 8px 10px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #1c2128; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge.dup { background: #f8514922; color: #f85149; }
  .badge.read { background: #f0883e22; color: #f0883e; }
  .badge.fail { background: #da363322; color: #da3633; }
  .badge.revert { background: #a371f722; color: #a371f7; }
  .badge.zombie { background: #8b949e22; color: #8b949e; }

  .roi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .roi-item { text-align: center; padding: 12px; }
  .roi-item .num { font-size: 24px; font-weight: 700; color: #56d364; }
  .roi-item .desc { font-size: 12px; color: #8b949e; margin-top: 4px; }

  .loading { text-align: center; padding: 40px; color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <h1><span>cc-track</span> Dashboard</h1>
  <div class="controls">
    <button onclick="setPeriod('week')" id="btn-week" class="active">7 Days</button>
    <button onclick="setPeriod('month')" id="btn-month">30 Days</button>
  </div>
</div>

<div class="grid">
  <div class="card"><div class="label">Sessions</div><div class="value sessions" id="stat-sessions">-</div></div>
  <div class="card"><div class="label">Estimated Cost</div><div class="value cost" id="stat-cost">-</div></div>
  <div class="card"><div class="label">Tool Calls</div><div class="value tools" id="stat-tools">-</div></div>
  <div class="card"><div class="label">Error Rate</div><div class="value error" id="stat-error">-</div></div>
</div>

<div class="charts">
  <div class="chart-card">
    <h3>Daily Cost</h3>
    <canvas id="chart-cost" height="200"></canvas>
  </div>
  <div class="chart-card">
    <h3>Tool Distribution</h3>
    <canvas id="chart-tools" height="200"></canvas>
  </div>
</div>

<div class="charts">
  <div class="chart-card">
    <h3>Daily Sessions & Prompts</h3>
    <canvas id="chart-activity" height="180"></canvas>
  </div>
  <div class="chart-card">
    <h3>ROI</h3>
    <div class="roi-grid" id="roi-data">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="chart-card">
    <h3>Recent Sessions</h3>
    <table>
      <thead><tr><th>ID</th><th>Project</th><th>Prompts</th><th>Tools</th><th>Cost</th></tr></thead>
      <tbody id="sessions-table"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="chart-card">
    <h3>Waste Detection</h3>
    <table>
      <thead><tr><th>Type</th><th>Summary</th></tr></thead>
      <tbody id="waste-table"><tr><td colspan="2" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
let period = 'week';
let costChart, toolChart, activityChart;

const colors = {
  blue: '#58a6ff', green: '#56d364', orange: '#f0883e',
  red: '#f85149', purple: '#a371f7', gray: '#8b949e',
  yellow: '#e3b341', cyan: '#39d2c0'
};

function setPeriod(p) {
  period = p;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + p).classList.add('active');
  loadAll();
}

async function api(path) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`/api/${path}${sep}period=${period}`);
  return res.json();
}

function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

async function loadSummary() {
  const data = await api('summary');
  const s = data.summary;
  document.getElementById('stat-sessions').textContent = s.total_sessions;
  document.getElementById('stat-cost').textContent = '$' + data.cost.total_cost.toFixed(2);
  document.getElementById('stat-tools').textContent = fmt(s.total_tool_calls);
  document.getElementById('stat-error').textContent = s.error_rate.toFixed(1) + '%';

  // Tool distribution chart
  if (s.tool_breakdown && s.tool_breakdown.length > 0) {
    const top = s.tool_breakdown.slice(0, 8);
    const labels = top.map(t => t.name);
    const values = top.map(t => t.count);
    const palette = [colors.blue, colors.green, colors.orange, colors.purple, colors.red, colors.yellow, colors.cyan, colors.gray];

    if (toolChart) toolChart.destroy();
    toolChart = new Chart(document.getElementById('chart-tools'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: palette, borderWidth: 0 }] },
      options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 } } } } }
    });
  }
}

async function loadTrend() {
  const data = await api('trend');
  if (!data || data.length === 0) return;

  const labels = data.map(d => d.date.slice(5));
  const costs = data.map(d => d.cost || 0);
  const sessions = data.map(d => d.sessions);
  const prompts = data.map(d => d.prompts);

  if (costChart) costChart.destroy();
  costChart = new Chart(document.getElementById('chart-cost'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Cost ($)', data: costs, backgroundColor: colors.orange + '88', borderColor: colors.orange, borderWidth: 1 }] },
    options: { responsive: true, scales: { y: { ticks: { color: '#8b949e', callback: v => '$' + v.toFixed(0) }, grid: { color: '#21262d' } }, x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } } }, plugins: { legend: { display: false } } }
  });

  if (activityChart) activityChart.destroy();
  activityChart = new Chart(document.getElementById('chart-activity'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Sessions', data: sessions, borderColor: colors.blue, backgroundColor: colors.blue + '22', fill: true, tension: 0.3 },
      { label: 'Prompts', data: prompts, borderColor: colors.green, backgroundColor: colors.green + '22', fill: true, tension: 0.3 }
    ] },
    options: { responsive: true, scales: { y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }, x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } } }, plugins: { legend: { labels: { color: '#8b949e' } } } }
  });
}

async function loadSessions() {
  const data = await api('sessions?limit=10');
  const tbody = document.getElementById('sessions-table');
  if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="5">No sessions</td></tr>'; return; }

  tbody.innerHTML = data.map(s => {
    const id = s.id.slice(0, 10);
    const cost = s.cost > 0 ? '$' + s.cost.toFixed(2) : '-';
    return `<tr><td><code>${id}</code></td><td>${s.project || '-'}</td><td>${s.total_prompts}</td><td>${s.total_tool_calls}</td><td>${cost}</td></tr>`;
  }).join('');
}

const wasteLabels = {
  duplicate_calls: { text: 'Duplicate', cls: 'dup' },
  excessive_reads: { text: 'Reads', cls: 'read' },
  failed_retries: { text: 'Retries', cls: 'fail' },
  edit_revert: { text: 'Revert', cls: 'revert' },
  zombie_session: { text: 'Zombie', cls: 'zombie' }
};

async function loadWaste() {
  const data = await api('waste');
  const tbody = document.getElementById('waste-table');
  if (!data.findings || data.findings.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" style="color:#56d364">No waste detected!</td></tr>';
    return;
  }

  tbody.innerHTML = data.findings.slice(0, 10).map(f => {
    const w = wasteLabels[f.type] || { text: f.type, cls: '' };
    const summary = f.summary.length > 60 ? f.summary.slice(0, 60) + '...' : f.summary;
    return `<tr><td><span class="badge ${w.cls}">${w.text}</span></td><td>${summary}</td></tr>`;
  }).join('');
}

async function loadROI() {
  const data = await api('roi');
  const el = document.getElementById('roi-data');
  if (!data || data.commits === 0) {
    el.innerHTML = '<div class="loading">No git data</div>';
    return;
  }
  el.innerHTML = `
    <div class="roi-item"><div class="num">${data.commits}</div><div class="desc">Commits</div></div>
    <div class="roi-item"><div class="num" style="color:${colors.green}">+${fmt(data.lines_added)}</div><div class="desc">Lines Added</div></div>
    <div class="roi-item"><div class="num" style="color:${colors.red}">-${fmt(data.lines_removed)}</div><div class="desc">Lines Removed</div></div>
  `;
}

function loadAll() {
  loadSummary();
  loadTrend();
  loadSessions();
  loadWaste();
  loadROI();
}

loadAll();
// Auto-refresh every 30s
setInterval(loadAll, 30000);
</script>
</body>
</html>
