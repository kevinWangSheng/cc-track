<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc-track Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; display: flex; flex-direction: column; }

  .header { padding: 8px 20px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header h1 span { color: #58a6ff; }
  .controls { display: flex; gap: 6px; }
  .controls button { padding: 4px 12px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px; }
  .controls button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .controls button:hover { background: #30363d; }
  .controls button.active:hover { background: #388bfd; }

  .dashboard { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: auto 1fr 1fr; gap: 10px; padding: 10px 16px; overflow: hidden; min-height: 0; }

  /* Row 1: 4 stat cards */
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 10px 14px; }
  .card .label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .card .value.cost { color: #f0883e; }
  .card .value.sessions { color: #58a6ff; }
  .card .value.tools { color: #56d364; }
  .card .value.error { color: #f85149; }

  /* Row 2: charts */
  .chart-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 10px 14px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .chart-card h3 { font-size: 11px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
  .chart-card .chart-wrap { flex: 1; position: relative; min-height: 0; }
  .chart-card canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

  /* Span helpers */
  .span2 { grid-column: span 2; }
  .span3 { grid-column: span 3; }

  /* ROI */
  .roi-grid { display: flex; align-items: center; justify-content: space-around; flex: 1; }
  .roi-item { text-align: center; }
  .roi-item .num { font-size: 20px; font-weight: 700; color: #56d364; }
  .roi-item .desc { font-size: 10px; color: #8b949e; margin-top: 2px; }

  /* Tables */
  .table-wrap { flex: 1; overflow-y: auto; min-height: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; padding: 4px 6px; color: #8b949e; border-bottom: 1px solid #21262d; font-weight: 500; position: sticky; top: 0; background: #161b22; }
  td { padding: 4px 6px; border-bottom: 1px solid #161b22; }
  tr:hover td { background: #1c2128; }

  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 500; }
  .badge.dup { background: #f8514922; color: #f85149; }
  .badge.read { background: #f0883e22; color: #f0883e; }
  .badge.fail { background: #da363322; color: #da3633; }
  .badge.revert { background: #a371f722; color: #a371f7; }
  .badge.zombie { background: #8b949e22; color: #8b949e; }

  .loading { text-align: center; padding: 20px; color: #8b949e; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>cc-track</span> Dashboard</h1>
  <div class="controls">
    <button onclick="setPeriod('week')" id="btn-week" class="active">7 Days</button>
    <button onclick="setPeriod('month')" id="btn-month">30 Days</button>
  </div>
</div>

<div class="dashboard">
  <!-- Row 1: Stats -->
  <div class="card"><div class="label">Sessions</div><div class="value sessions" id="stat-sessions">-</div></div>
  <div class="card"><div class="label">Estimated Cost</div><div class="value cost" id="stat-cost">-</div></div>
  <div class="card"><div class="label">Tool Calls</div><div class="value tools" id="stat-tools">-</div></div>
  <div class="card"><div class="label">Error Rate</div><div class="value error" id="stat-error">-</div></div>

  <!-- Row 2: Charts -->
  <div class="chart-card span2">
    <h3>Daily Cost</h3>
    <div class="chart-wrap"><canvas id="chart-cost"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Tools</h3>
    <div class="chart-wrap"><canvas id="chart-tools"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>ROI</h3>
    <div class="roi-grid" id="roi-data"><div class="loading">Loading...</div></div>
  </div>

  <!-- Row 3: Activity chart + tables -->
  <div class="chart-card span2">
    <h3>Daily Activity</h3>
    <div class="chart-wrap"><canvas id="chart-activity"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Recent Sessions</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Project</th><th>P</th><th>T</th><th>Cost</th></tr></thead>
        <tbody id="sessions-table"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="chart-card">
    <h3>Waste Detection</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Type</th><th>Summary</th></tr></thead>
        <tbody id="waste-table"><tr><td colspan="2" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let period = 'week';
let costChart, toolChart, activityChart;

const colors = {
  blue: '#58a6ff', green: '#56d364', orange: '#f0883e',
  red: '#f85149', purple: '#a371f7', gray: '#8b949e',
  yellow: '#e3b341', cyan: '#39d2c0'
};

function setPeriod(p) {
  period = p;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + p).classList.add('active');
  loadAll();
}

async function api(path) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`/api/${path}${sep}period=${period}`);
  return res.json();
}

function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

const compactChart = { responsive: true, maintainAspectRatio: false };

async function loadSummary() {
  const data = await api('summary');
  const s = data.summary;
  document.getElementById('stat-sessions').textContent = s.total_sessions;
  document.getElementById('stat-cost').textContent = '$' + data.cost.total_cost.toFixed(2);
  document.getElementById('stat-tools').textContent = fmt(s.total_tool_calls);
  document.getElementById('stat-error').textContent = s.error_rate.toFixed(1) + '%';

  if (s.tool_breakdown && s.tool_breakdown.length > 0) {
    const top = s.tool_breakdown.slice(0, 6);
    const labels = top.map(t => t.name);
    const values = top.map(t => t.count);
    const palette = [colors.blue, colors.green, colors.orange, colors.purple, colors.red, colors.yellow];

    if (toolChart) toolChart.destroy();
    toolChart = new Chart(document.getElementById('chart-tools'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: palette, borderWidth: 0 }] },
      options: { ...compactChart, plugins: { legend: { position: 'right', labels: { color: '#8b949e', font: { size: 10 }, padding: 6 } } } }
    });
  }
}

async function loadTrend() {
  const data = await api('trend');
  if (!data || data.length === 0) return;

  const labels = data.map(d => d.date.slice(5));
  const costs = data.map(d => d.cost || 0);
  const sessions = data.map(d => d.sessions);
  const prompts = data.map(d => d.prompts);

  if (costChart) costChart.destroy();
  costChart = new Chart(document.getElementById('chart-cost'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Cost ($)', data: costs, backgroundColor: colors.orange + '88', borderColor: colors.orange, borderWidth: 1 }] },
    options: { ...compactChart, scales: { y: { ticks: { color: '#8b949e', font: { size: 10 }, callback: v => '$' + v.toFixed(0) }, grid: { color: '#21262d' } }, x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } } }, plugins: { legend: { display: false } } }
  });

  if (activityChart) activityChart.destroy();
  activityChart = new Chart(document.getElementById('chart-activity'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Sessions', data: sessions, borderColor: colors.blue, backgroundColor: colors.blue + '22', fill: true, tension: 0.3, borderWidth: 2, pointRadius: 2 },
      { label: 'Prompts', data: prompts, borderColor: colors.green, backgroundColor: colors.green + '22', fill: true, tension: 0.3, borderWidth: 2, pointRadius: 2 }
    ] },
    options: { ...compactChart, scales: { y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } }, x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } } }, plugins: { legend: { labels: { color: '#8b949e', font: { size: 10 } } } } }
  });
}

async function loadSessions() {
  const data = await api('sessions?limit=8');
  const tbody = document.getElementById('sessions-table');
  if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="5">No sessions</td></tr>'; return; }

  tbody.innerHTML = data.map(s => {
    const id = s.id.slice(0, 8);
    const proj = (s.project || '-').slice(0, 12);
    const cost = s.cost > 0 ? '$' + s.cost.toFixed(2) : '-';
    return `<tr><td><code>${id}</code></td><td>${proj}</td><td>${s.total_prompts}</td><td>${s.total_tool_calls}</td><td>${cost}</td></tr>`;
  }).join('');
}

const wasteLabels = {
  duplicate_calls: { text: 'Dup', cls: 'dup' },
  excessive_reads: { text: 'Reads', cls: 'read' },
  failed_retries: { text: 'Retry', cls: 'fail' },
  edit_revert: { text: 'Revert', cls: 'revert' },
  zombie_session: { text: 'Zombie', cls: 'zombie' }
};

async function loadWaste() {
  const data = await api('waste');
  const tbody = document.getElementById('waste-table');
  if (!data.findings || data.findings.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" style="color:#56d364">No waste!</td></tr>';
    return;
  }

  tbody.innerHTML = data.findings.slice(0, 8).map(f => {
    const w = wasteLabels[f.type] || { text: f.type, cls: '' };
    const summary = f.summary.length > 45 ? f.summary.slice(0, 45) + '...' : f.summary;
    return `<tr><td><span class="badge ${w.cls}">${w.text}</span></td><td>${summary}</td></tr>`;
  }).join('');
}

async function loadROI() {
  const data = await api('roi');
  const el = document.getElementById('roi-data');
  if (!data || data.commits === 0) {
    el.innerHTML = '<div class="loading">No git data</div>';
    return;
  }
  el.innerHTML = `
    <div class="roi-item"><div class="num">${data.commits}</div><div class="desc">Commits</div></div>
    <div class="roi-item"><div class="num" style="color:${colors.green}">+${fmt(data.lines_added)}</div><div class="desc">Added</div></div>
    <div class="roi-item"><div class="num" style="color:${colors.red}">-${fmt(data.lines_removed)}</div><div class="desc">Removed</div></div>
  `;
}

function loadAll() {
  loadSummary();
  loadTrend();
  loadSessions();
  loadWaste();
  loadROI();
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
